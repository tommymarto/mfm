defaults:
  - _self_
  - model: sit_xl_2
  - dataset: imagenet_1k 
  - SI: linear

use_parametrization: false
checkpoint_path: "${hydra:runtime.cwd}/ckpts/mfm-xl2.pt"
save_dir: "${hydra:runtime.cwd}/reward_experiments"

hydra:
  run: 
    dir: ${hydra:runtime.cwd}/outputs/${now:%Y-%m-%d_%H-%M-%S}

seed: 42
num_samples: 128
per_proc_batch_size: 64

# sampling args
n_steps: 250
step_power: 2.5 
resampling_type: max_overall # max_per_particle, max_overall
transition_type: stochastic 
particles: 8
mc_samples_per_particle: 4

image_reward:
  prompt:  "A high-resolution, high-quality photograph of a tabby cat."
  _lambda: 1.0 # no effect on greedy search
  model_name: HPSv2

cfg_scale: 2.5
class_label: 281
